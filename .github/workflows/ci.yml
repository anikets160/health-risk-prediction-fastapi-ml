name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-backend:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install backend dependencies
      run: |
        echo "Installing Python dependencies from requirements.txt"
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .

    - name: Run backend unit tests
      env:
        PYTHONPATH: .
      run: |
        echo "Running pytest on tests/ with repository root in PYTHONPATH"
        python -m pytest tests/ -v

  build-docker:
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx builder
      uses: docker/setup-buildx-action@v3

    - name: Build backend Docker image from root Dockerfile
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: false
        tags: health-risk-api:test

    - name: Build frontend Docker image from frontend/Dockerfile
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: false
        tags: health-risk-frontend:test

  test-frontend:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      run: |
        echo "Installing frontend dependencies in frontend/"
        cd frontend
        npm ci

    - name: Build frontend production bundle
      run: |
        echo "Building React frontend application"
        cd frontend
        npm run build --if-present

    # Uncomment if you add frontend tests
    # - name: Run frontend tests
    #   run: |
    #     cd frontend
    #     npm test -- --watchAll=false --passWithNoTests
